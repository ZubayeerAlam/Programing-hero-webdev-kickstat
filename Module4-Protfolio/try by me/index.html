<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #container {
            display: flex; 
            /* block=shob unit kajj korbe
            inline=shob unit ek line e thakbe utit kajj korbe na
            flex=shob unit ek line e thakbe utit kajj korbe pasha pashai eliment use kora jabe*/
            /* flex-direction: column; */
            flex-direction: row; /*na dileo hobe default vabe row e thakbe*/
            background-color: black;
            gap: 40px;
            justify-content: space-around; /*shob unit er modhye space thakbe*/ 
            min-height: 100px;
            align-items: center;
            flex-wrap: wrap; /*jodi ek line e na thake tahole nicher line e chole jabe*/
            row-gap: 100px; /*jodi ek line e na thake tahole nicher line e chole jabe tar modhye space thakbe*/
             column-gap: 100px; /*shob unit er modhye space thakbe*/
        }
        .box {
            width: 75px;
            height: 100px;
            background-color: #333; 
            color: white;
            display: inline-block;
             margin: 10px;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box">box1</div>
        <div class="box">box2</div> 
        <div class="box">box3</div>
    </div>
</body>
</html>
